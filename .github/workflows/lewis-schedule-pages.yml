name: Deploy Lewis Schedule (standalone)

on:
  push:
    branches: [main, cursor/lewis-schedule-web-d552]
    paths:
      - "lewis-schedule/standalone/**"
      - ".github/workflows/lewis-schedule-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lewis-schedule-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: lewis-schedule/standalone
      - id: deployment
        uses: actions/deploy-pages@v4
