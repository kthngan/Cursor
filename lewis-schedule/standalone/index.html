<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lewis Schedule" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#171a21" />
  <title>Lewis Schedule</title>
  <style>
:root {
  color-scheme: light dark;
  --bg: #0f1115;
  --panel: #171a21;
  --text: #e8eaed;
  --muted: #9aa0a6;
  --accent: #7cb8ff;
  --accent-text: #081018;
  --border: #2a2f3a;
  --today: #2a3d2a;
  --danger: #ff8a80;
  --success: #9be7a3;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
}

.hidden {
  display: none !important;
}

.muted {
  color: var(--muted);
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.offline-banner {
  margin: 0;
  padding: 10px 16px;
  background: #2a2418;
  border-bottom: 1px solid var(--border);
  color: #f0d9a8;
  font-size: 0.85rem;
  line-height: 1.4;
  text-align: center;
}

.topbar h1 {
  margin: 0;
  font-size: 1.25rem;
}

input,
textarea,
button {
  font: inherit;
}

input,
textarea {
  width: 100%;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0b0d11;
  color: var(--text);
  padding: 12px;
}

button {
  border: 0;
  border-radius: 12px;
  padding: 10px 14px;
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 600;
  cursor: pointer;
}

button.ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}

button.primary {
  background: var(--accent);
  color: var(--accent-text);
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.topbar-actions {
  display: flex;
  gap: 8px;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px;
  padding: 12px;
}

.hint {
  margin: 0 16px 8px;
  font-size: 0.9rem;
}

.schedule-grid {
  display: grid;
  gap: 8px;
  padding: 0 12px 24px;
}

.slot-row {
  display: grid;
  grid-template-columns: 72px 56px 1fr 1fr;
  gap: 8px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  touch-action: manipulation;
}

.slot-row.today {
  background: var(--today);
}

.slot-row.dragging {
  opacity: 0.55;
}

.slot-row.selected {
  outline: 2px solid var(--accent);
}

.slot-row[draggable="true"] {
  cursor: grab;
}

.day-label,
.period-label {
  font-size: 0.85rem;
}

.period-label {
  color: var(--muted);
}

.chip {
  min-height: 40px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px dashed var(--border);
  background: #10141b;
}

.chip:focus {
  outline: 2px solid var(--accent);
}

.caregiver-control {
  display: grid;
  gap: 6px;
  padding: 6px 8px;
}

.caregiver-select,
.caregiver-other {
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #0b0d11;
  color: var(--text);
  padding: 8px;
  min-height: 36px;
  font: inherit;
}

dialog {
  width: min(560px, calc(100vw - 24px));
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--panel);
  color: var(--text);
  padding: 0;
}

dialog::backdrop {
  background: rgba(0, 0, 0, 0.55);
}

.dialog-header,
.dialog-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 16px;
}

.dialog-header {
  border-bottom: 1px solid var(--border);
}

.dialog-footer {
  border-top: 1px solid var(--border);
}

#export-text {
  margin: 0 16px 12px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  background: #1f2937;
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: 999px;
  z-index: 20;
}

@media (max-width: 640px) {
  .slot-row {
    grid-template-columns: 64px 48px 1fr;
    grid-template-areas:
      "day period period"
      "activity activity caregiver";
  }

  .day-label {
    grid-area: day;
  }

  .period-label {
    grid-area: period;
  }

  .chip.activity {
    grid-area: activity;
  }

  .chip.caregiver {
    grid-area: caregiver;
  }
}
  </style>
</head>
<body>
  <p class="offline-banner" role="status">
    Offline mode — screenshot import needs the server (see SETUP-IPHONE.md)
  </p>

  <div id="app">
    <header class="topbar">
      <div>
        <h1>Lewis Schedule</h1>
        <p id="week-label" class="muted"></p>
      </div>
      <div class="topbar-actions">
        <button id="prev-week-btn" type="button" class="ghost">Prev</button>
        <button id="next-week-btn" type="button" class="ghost">Next</button>
      </div>
    </header>

    <section class="toolbar panel">
      <button id="reset-template-btn" type="button">Reload this week</button>
      <button id="import-btn" type="button">Import screenshot</button>
      <button id="export-btn" type="button">Export</button>
    </section>

    <p id="drag-hint" class="muted hint">Drag a row to swap slots. On phone: tap a row, then tap another to swap.</p>

    <section id="schedule-grid" class="schedule-grid" aria-label="Weekly schedule"></section>
  </div>

  <dialog id="export-dialog">
    <form method="dialog">
      <header class="dialog-header">
        <h2>Export schedule</h2>
        <button type="button" id="export-close-btn" class="ghost" aria-label="Close">Close</button>
      </header>
      <textarea id="export-text" readonly rows="14"></textarea>
      <footer class="dialog-footer">
        <button type="button" id="copy-export-btn" class="primary">Copy</button>
        <button type="button" id="share-export-btn">Share</button>
      </footer>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>

  <script>
const CONFIRMED_TEMPLATE = {
  "name": "Confirmed week of 14 Jul 2026",
  "week_start": "2026-07-14",
  "caregivers": ["Por por", "Mama"],
  "activities": [
    "Nancy class 9am",
    "Little Habs Interview class 8:45am",
    "Judy class",
    "Regular day",
    "Free"
  ],
  "slots": [
    { "day": "monday", "period": "morning", "activity": "Nancy class 9am", "caregiver": "Por por" },
    { "day": "monday", "period": "afternoon", "activity": "Regular day", "caregiver": "Por por" },
    { "day": "tuesday", "period": "morning", "activity": "Little Habs Interview class 8:45am", "caregiver": "Mama" },
    { "day": "tuesday", "period": "afternoon", "activity": "Regular day", "caregiver": "Mama" },
    { "day": "wednesday", "period": "morning", "activity": "Regular day", "caregiver": "Por por" },
    { "day": "wednesday", "period": "afternoon", "activity": "Regular day", "caregiver": "Por por" },
    { "day": "thursday", "period": "morning", "activity": "Nancy class 9am", "caregiver": "Por por" },
    { "day": "thursday", "period": "afternoon", "activity": "Regular day", "caregiver": "Mama" },
    { "day": "friday", "period": "morning", "activity": "Judy class", "caregiver": "Por por" },
    { "day": "friday", "period": "afternoon", "activity": "Mama (PM); Por por overnight", "caregiver": "Mama" },
    { "day": "saturday", "period": "morning", "activity": "Regular day", "caregiver": "Por por" },
    { "day": "saturday", "period": "afternoon", "activity": "Regular day", "caregiver": "Por por" }
  ]
};

const DAYS = [
  "monday",
  "tuesday",
  "wednesday",
  "thursday",
  "friday",
  "saturday",
];
const DAY_LABELS = {
  monday: "Mon",
  tuesday: "Tue",
  wednesday: "Wed",
  thursday: "Thu",
  friday: "Fri",
  saturday: "Sat",
};
const DAY_NAMES = {
  monday: "Monday",
  tuesday: "Tuesday",
  wednesday: "Wednesday",
  thursday: "Thursday",
  friday: "Friday",
  saturday: "Saturday",
};
const PERIODS = ["morning", "afternoon"];
const PERIOD_LABELS = { morning: "AM", afternoon: "PM" };
const CAREGIVER_PRESETS = ["Por por", "Mama"];
const STORAGE_KEY = "lewisScheduleState";
const TEMPLATE_VERSION_KEY = "lewisScheduleTemplateVersion";
const CURRENT_TEMPLATE_VERSION = "2026-07-14-v2-no-sunday";

const weekLabel = document.getElementById("week-label");
const scheduleGrid = document.getElementById("schedule-grid");
const exportDialog = document.getElementById("export-dialog");
const exportText = document.getElementById("export-text");
const exportCloseBtn = document.getElementById("export-close-btn");
const copyExportBtn = document.getElementById("copy-export-btn");
const shareExportBtn = document.getElementById("share-export-btn");
const toast = document.getElementById("toast");

let state = loadState();
let selectedSlotKey = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      return JSON.parse(raw);
    }
  } catch (_) {
    /* use default */
  }
  return {
    week_start: mondayIso(new Date()),
    caregivers: [],
    activities: [],
    slots: emptySlots(),
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function mondayIso(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function addDays(iso, days) {
  const d = new Date(iso + "T12:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function emptySlots() {
  const slots = [];
  for (const day of DAYS) {
    for (const period of PERIODS) {
      slots.push({ day, period, activity: "", caregiver: "" });
    }
  }
  return slots;
}

function slotKey(day, period) {
  return `${day}:${period}`;
}

function findSlot(day, period) {
  return state.slots.find((s) => s.day === day && s.period === period);
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.remove("hidden");
  setTimeout(() => toast.classList.add("hidden"), 2200);
}

function formatWeekLabel() {
  const start = new Date(state.week_start + "T12:00:00");
  const end = new Date(start);
  end.setDate(end.getDate() + (DAYS.length - 1));
  const fmt = new Intl.DateTimeFormat(undefined, { day: "numeric", month: "short" });
  weekLabel.textContent = `Week of ${fmt.format(start)} – ${fmt.format(end)}`;
}

function normalizeCaregiver(value) {
  const trimmed = (value || "").trim();
  if (trimmed === "Mah mah") {
    return "Mama";
  }
  return trimmed;
}

function isPresetCaregiver(value) {
  return CAREGIVER_PRESETS.includes(normalizeCaregiver(value));
}

function createCaregiverControl(slot) {
  const wrap = document.createElement("div");
  wrap.className = "caregiver-control chip caregiver";

  const select = document.createElement("select");
  select.className = "caregiver-select";
  for (const name of [...CAREGIVER_PRESETS, "Other"]) {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  }

  const otherInput = document.createElement("input");
  otherInput.type = "text";
  otherInput.className = "caregiver-other hidden";
  otherInput.placeholder = "Other name";

  const current = normalizeCaregiver(slot.caregiver);
  if (isPresetCaregiver(current)) {
    select.value = current;
  } else if (current) {
    select.value = "Other";
    otherInput.value = current;
    otherInput.classList.remove("hidden");
  } else {
    select.value = "Por por";
    slot.caregiver = "Por por";
  }

  function syncCaregiver() {
    if (select.value === "Other") {
      otherInput.classList.remove("hidden");
      slot.caregiver = otherInput.value.trim();
    } else {
      otherInput.classList.add("hidden");
      slot.caregiver = select.value;
    }
    saveState();
  }

  select.addEventListener("change", syncCaregiver);
  otherInput.addEventListener("input", syncCaregiver);
  for (const el of [select, otherInput, wrap]) {
    el.addEventListener("click", (event) => event.stopPropagation());
  }

  wrap.append(select, otherInput);
  return wrap;
}

function dateForSlot(dayIndex, period) {
  const start = new Date(state.week_start + "T12:00:00");
  start.setDate(start.getDate() + dayIndex);
  return start.toISOString().slice(0, 10);
}

function isToday(day, period) {
  const dayIndex = DAYS.indexOf(day);
  const slotDate = dateForSlot(dayIndex, period);
  const today = new Date().toISOString().slice(0, 10);
  return slotDate === today;
}

function swapSlots(sourceDay, sourcePeriod, targetDay, targetPeriod) {
  const source = findSlot(sourceDay, sourcePeriod);
  const target = findSlot(targetDay, targetPeriod);
  if (!source || !target) {
    return;
  }
  const tempActivity = source.activity;
  const tempCaregiver = source.caregiver;
  source.activity = target.activity;
  source.caregiver = target.caregiver;
  target.activity = tempActivity;
  target.caregiver = tempCaregiver;
  saveState();
  render();
}

function applyTemplate(template) {
  if (template.week_start) {
    state.week_start = template.week_start;
  }
  state.caregivers = template.caregivers || [];
  state.activities = template.activities || [];
  state.slots = template.slots.map((slot) => ({
    day: slot.day,
    period: slot.period,
    activity: slot.activity || "",
    caregiver: slot.caregiver || "",
  }));
  saveState();
  render();
}

function loadConfirmedTemplate(showNotice = true) {
  applyTemplate(CONFIRMED_TEMPLATE);
  localStorage.setItem(TEMPLATE_VERSION_KEY, CURRENT_TEMPLATE_VERSION);
  if (showNotice) {
    showToast("This week's schedule loaded");
  }
}

function ensureTemplateLoaded() {
  if (localStorage.getItem(TEMPLATE_VERSION_KEY) === CURRENT_TEMPLATE_VERSION) {
    return;
  }
  loadConfirmedTemplate(false);
  showToast("Confirmed schedule for this week loaded");
}

function render() {
  formatWeekLabel();
  scheduleGrid.innerHTML = "";

  for (const day of DAYS) {
    for (const period of PERIODS) {
      const slot = findSlot(day, period);
      const row = document.createElement("article");
      row.className = "slot-row";
      row.dataset.day = day;
      row.dataset.period = period;
      row.draggable = true;

      if (isToday(day, period)) {
        row.classList.add("today");
      }

      const dayLabel = document.createElement("div");
      dayLabel.className = "day-label";
      dayLabel.textContent = period === "morning" ? DAY_LABELS[day] : "";

      const periodLabel = document.createElement("div");
      periodLabel.className = "period-label";
      periodLabel.textContent = PERIOD_LABELS[period];

      const activityChip = document.createElement("div");
      activityChip.className = "chip activity";
      activityChip.textContent = slot.activity || "Activity";
      activityChip.contentEditable = "true";
      activityChip.spellcheck = false;
      activityChip.addEventListener("blur", () => {
        slot.activity = activityChip.textContent.trim();
        saveState();
      });

      const caregiverChip = createCaregiverControl(slot);

      row.append(dayLabel, periodLabel, activityChip, caregiverChip);
      bindDragAndTap(row);
      scheduleGrid.appendChild(row);
    }
  }
}

function bindDragAndTap(row) {
  row.addEventListener("dragstart", (event) => {
    row.classList.add("dragging");
    event.dataTransfer.setData(
      "text/plain",
      JSON.stringify({ day: row.dataset.day, period: row.dataset.period })
    );
  });

  row.addEventListener("dragend", () => {
    row.classList.remove("dragging");
  });

  row.addEventListener("dragover", (event) => {
    event.preventDefault();
  });

  row.addEventListener("drop", (event) => {
    event.preventDefault();
    try {
      const source = JSON.parse(event.dataTransfer.getData("text/plain"));
      swapSlots(source.day, source.period, row.dataset.day, row.dataset.period);
    } catch (_) {
      /* ignore invalid drop */
    }
  });

  row.addEventListener("click", () => {
    const key = slotKey(row.dataset.day, row.dataset.period);
    if (!selectedSlotKey) {
      selectedSlotKey = key;
      row.classList.add("selected");
      showToast("Tap another row to swap");
      return;
    }
    if (selectedSlotKey === key) {
      selectedSlotKey = null;
      row.classList.remove("selected");
      return;
    }
    const [sourceDay, sourcePeriod] = selectedSlotKey.split(":");
    document
      .querySelectorAll(".slot-row.selected")
      .forEach((el) => el.classList.remove("selected"));
    selectedSlotKey = null;
    swapSlots(sourceDay, sourcePeriod, row.dataset.day, row.dataset.period);
  });
}

function isRegularActivity(activity) {
  const value = (activity || "").trim().toLowerCase();
  return !value || value === "regular day" || value === "free";
}

function formatExportWeekTitle() {
  const start = new Date(state.week_start + "T12:00:00");
  const fmt = new Intl.DateTimeFormat(undefined, {
    day: "numeric",
    month: "short",
    year: "numeric",
  });
  return fmt.format(start);
}

function buildExportText() {
  const lines = [`📅 *Lewis — Week of ${formatExportWeekTitle()}*`, ""];

  for (const day of DAYS) {
    lines.push(`*${DAY_NAMES[day]}*`);
    lines.push("────────────────");

    for (const period of PERIODS) {
      const slot = findSlot(day, period);
      const activity = (slot.activity || "").trim();
      const caregiver = (slot.caregiver || "—").trim();
      const periodLabel = PERIOD_LABELS[period].padEnd(2, " ");

      if (isRegularActivity(activity)) {
        lines.push(`${periodLabel}  ${caregiver}`);
      } else {
        lines.push(`${periodLabel} ★ *${activity}* · ${caregiver}`);
      }
    }

    lines.push("");
  }

  lines.push("_Generated from Lewis Schedule_");
  return lines.join("\n");
}

document.getElementById("prev-week-btn").addEventListener("click", () => {
  state.week_start = addDays(state.week_start, -7);
  saveState();
  render();
});

document.getElementById("next-week-btn").addEventListener("click", () => {
  state.week_start = addDays(state.week_start, 7);
  saveState();
  render();
});

document.getElementById("reset-template-btn").addEventListener("click", () => {
  if (!confirm("Reload the confirmed schedule for this week? This replaces your current edits.")) {
    return;
  }
  loadConfirmedTemplate();
});

document.getElementById("import-btn").addEventListener("click", () => {
  alert(
    "Screenshot import needs the Lewis Schedule server running on your PC or cloud.\n\n" +
    "When you are on the same Wi-Fi as your PC:\n" +
    "1. Start the server (see lewis-schedule/SETUP-IPHONE.md)\n" +
    "2. Open http://<your-pc-ip>:8790 in Safari\n" +
    "3. Use Import screenshot there\n\n" +
    "This offline page supports viewing, editing, swapping, and export only."
  );
});

exportCloseBtn.addEventListener("click", () => exportDialog.close());

document.getElementById("export-btn").addEventListener("click", () => {
  exportText.value = buildExportText();
  exportDialog.showModal();
});

copyExportBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(exportText.value);
  showToast("Copied — paste into WhatsApp");
});

shareExportBtn.addEventListener("click", async () => {
  const text = exportText.value;
  if (navigator.share) {
    try {
      await navigator.share({ text, title: "Lewis Schedule" });
      return;
    } catch (_) {
      /* fall through to copy */
    }
  }
  await navigator.clipboard.writeText(text);
  showToast("Copied — paste into WhatsApp");
});

if (!state.slots?.length) {
  state.slots = emptySlots();
}

ensureTemplateLoaded();
render();
  </script>
</body>
</html>
